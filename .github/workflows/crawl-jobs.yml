name: Crawl Jobs

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: Search keyword to crawl across all supported providers
        required: true
        default: 後端
      reset_google_sheet:
        description: Clear provider worksheets before syncing new results
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
      SMTP_TO_EMAIL: ${{ secrets.SMTP_TO_EMAIL }}
      MACHINE_EMAIL_ENABLED: ${{ secrets.MACHINE_EMAIL_ENABLED }}
      MACHINE_EMAIL_TO: ${{ secrets.MACHINE_EMAIL_TO }}
      GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Write Google service account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/google-service-account.json
        run: |
          mkdir -p "$(dirname "$GOOGLE_SERVICE_ACCOUNT_JSON_PATH")"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT" > "$GOOGLE_SERVICE_ACCOUNT_JSON_PATH"
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=$GOOGLE_SERVICE_ACCOUNT_JSON_PATH" >> "$GITHUB_ENV"

      - name: Run multi-site crawler
        env:
          KEYWORD: ${{ inputs.keyword }}
          RESET_GOOGLE_SHEET: ${{ inputs.reset_google_sheet }}
        run: |
          command=(
            python -m crawler.cli all "$KEYWORD"
            --sync-google-sheet
            --send-email-notification
            --send-machine-email-notification
          )

          if [ "$RESET_GOOGLE_SHEET" = "true" ]; then
            command+=(--reset-google-sheet)
          fi

          "${command[@]}"
